<button type="button" class="settings-trigger" (click)="toggleConfig()">
  ⚙️
</button>
<button type="button" class="home-trigger" (click)="returnHome()">🏠</button>
@if (isConfigOpen()) {
  <div class="modal-overlay">
    <div class="modal-content">
      <h2>Configuración</h2>

      <div class="field">
        <label>Nombre del Piloto</label>
        <input
          title="Nombre del piloto"
          [value]="userConfig().name"
          (input)="updateConfig('name', $any($event.target).value)"
        />
      </div>

      <div class="field">
        <label>Color del Coche</label>
        <input
          title="Color del coche"
          type="color"
          [value]="userConfig().carColor"
          (input)="updateConfig('carColor', $any($event.target).value)"
        />
      </div>

      <div class="field">
        <label>Modelo</label>
        <select
          title="Modelo del coche"
          [value]="userConfig().carModel"
          (change)="updateConfig('carModel', $any($event.target).value)"
        >
          <option value="sedan">🚗 Sedán</option>
          <option value="sport">🏎️ Deportivo</option>
          <option value="truck">🚚 Camión</option>
        </select>
      </div>

      <button class="save-btn" (click)="toggleConfig()">Cerrar y Jugar</button>
    </div>
  </div>
}

<div class="gamepad" [class.blur]="isConfigOpen()">
  <div class="dpad">
    @for (dir of ["UP", "LEFT", "RIGHT", "DOWN"]; track dir) {
      <button
        type="button"
        [class]="'btn ' + dir.toLowerCase()"
        [class.active]="activeButtons()[dir]"
        (mousedown)="startMove(dir)"
        (touchstart)="$event.preventDefault(); startMove(dir)"
      >
        @if (dir === "UP") { ▲ }
        @else if (dir === "LEFT") { ◀ }
        @else if (dir === "RIGHT") { ▶ }
        @else if (dir === "DOWN") { ▼ }
      </button>
    }
  </div>

  <div class="actions">
    <button
      type="button"
      class="horn-btn"
      [class.active]="activeButtons()['HORN']"
      (mousedown)="startMove('HORN')"
      (touchstart)="$event.preventDefault(); startMove('HORN')"
    >
      CLAXON
    </button>
  </div>
</div>
